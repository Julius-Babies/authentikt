name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ktor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and check
        run: ./gradlew :core:build :core:dokkaGenerateHtml

  svelte:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Typecheck
        run: bun run check

      - name: Build library
        run: bun run prepack
