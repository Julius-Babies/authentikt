name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      semver: ${{ steps.tag.outputs.VERSION }}
    steps:
      - run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
        id: tag

  ktor:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', 'gradle/**') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Publish to Maven Central
        run: |
          ./gradlew :core:publishAndReleaseToMavenCentral \
            -Pversion=${{ needs.version.outputs.semver }}
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}

  svelte:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    defaults:
      run:
        working-directory: frontend-svelte

    steps:
      - uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build and publish
        run: |
          VERSION="${{ needs.version.outputs.semver }}"

          # Set version from tag
          jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json

          # Configure GitHub Packages auth
          PATH="node_modules/.bin:$PATH"
          echo "@Julius-Babies:registry=https://registry.npmjs.org/" > .npmrc
          echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" >> .npmrc

          bun run prepack
          bun publish
