project:
  name: "Authentikt"
  id: "authentikt-lib"

services:
  - name: "backend"
    modes:
      local:
        port: 8080

  - name: "frontend"
    modes:
      local:
        port: 5173

http:
  - path_prefixes:
      - /api
    target_service: backend
  - path_prefixes:
      - /
    target_service: frontend

dependencies:
  keycloak: true